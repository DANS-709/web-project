{% if character.comments %}
    <div class="d-flex flex-column gap-3">
        {% for comment in character.comments|reverse %}
            <div class="d-flex gap-3">
                <div class="bg-secondary rounded-circle d-flex align-items-center justify-content-center text-white" style="width: 40px; height: 40px; flex-shrink: 0;">
                    {{ comment.user.username[0]|upper }}
                </div>
                <div class="bg-dark p-3 rounded flex-grow-1 border border-secondary border-opacity-25">
                    <div class="d-flex justify-content-between mb-1">
                        <strong class="text-info">{{ comment.user.username }}</strong>
                    </div>
                    <p class="mb-0 text-light comment-text">{{ comment.text }}</p>
                </div>
            </div>
        {% endfor %}
    </div>
{% else %}
    <p class="text-muted text-center py-3 mb-0" id="no-comments-msg">Комментариев пока нет. Будьте первым!</p>
{% endif %}
