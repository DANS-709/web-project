{% if current_user.is_authenticated %}
    <button hx-post="{{ url_for('toggle_like', char_id=character.id) }}"
            hx-swap="outerHTML"
            class="btn {% if user_liked %}btn-danger{% else %}btn-outline-danger{% endif %} rounded-pill">
        <i class="bi {% if user_liked %}bi-heart-fill{% else %}bi-heart{% endif %}"></i>
        Лайк ({{ character.likes|length }})
    </button>
{% else %}
    <!-- Если не авторизован - перекидываем на логин-->
    <a href="{{ url_for('login') }}" class="btn btn-outline-secondary rounded-pill">
        <i class="bi bi-heart"></i> Лайк ({{ character.likes|length }})
    </a>
{% endif %}
